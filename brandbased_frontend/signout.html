<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brandbased • signed out</title>

    <link rel="icon" href="./favicons/favicon.ico" sizes="any" />
    <link rel="icon" href="./favicons/icon.svg" type="image/svg+xml" />

    <link rel="stylesheet" href="signup-page.css">
    <link rel="stylesheet" href="brand-modules-bundle/_shared/sync-popup.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body.signout-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .signout-page__center {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* Same glass card as brand-console sync popup — always visible (no backdrop) */
        .signout-page .bb-sync-popup.signout-card {
            --bb-sync-popup-bar-color: #635bff;
            width: 100%;
            opacity: 1;
            transform: none;
            gap: 16px;
            padding: 32px 28px 26px;
        }

        .signout-page .bb-sync-popup__logo {
            --bb-sync-popup-bar-color: #635bff;
        }

        .signout-page .signout-card__title {
            margin: 0;
            font: 700 28px/1.15 Inter, system-ui, sans-serif;
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }

        .signout-page .signout-card__text {
            margin: 0 0 8px;
            font: 400 15px/1.65 Inter, system-ui, sans-serif;
            color: rgba(255, 255, 255, 0.82);
            text-align: center;
        }

        /* Same glass Login CTA as index (.signup-btn) */
        .signout-page .bb-sync-popup .signup-btn {
            width: 100%;
            max-width: none;
            margin: 8px 0 0;
        }

        @media (prefers-color-scheme: light) {
            body.signout-page:not(.light-mode) .signout-page__center {
                background: #80808070;
                border-radius: 20px;
            }

            body.signout-page:not(.light-mode) .signout-card__title {
                color: #111;
                text-shadow: none;
            }

            body.signout-page:not(.light-mode) .signout-card__text {
                color: rgba(15, 23, 42, 0.72);
            }
        }

        body.light-mode.signout-page .signout-page__center {
            background: #80808070;
            border-radius: 20px;
        }

        body.light-mode.signout-page .signout-card__title {
            color: #111;
            text-shadow: none;
        }

        body.light-mode.signout-page .signout-card__text {
            color: rgba(15, 23, 42, 0.72);
        }

        body.light-mode.signout-page .bb-sync-popup.signout-card {
            background: #ffffff78;
        }

        @media (max-width: 600px) {
            .signout-page .signout-card__title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body class="signout-page">

    <div class="light-shard-ui-base">
        <div class="light-shard-ui-theme"></div>
        <div class="light-shard-ui-theme" style="--delay: -12s; --size: 0.35; --speed: 45s;"></div>
        <div class="light-shard-ui-theme" style="--delay: -10s; --size: 0.3; --speed: 30s;"></div>
    </div>

    <div class="signout-page__center">
        <div class="bb-sync-popup signout-card" role="dialog" aria-labelledby="signout-title">
            <span class="bb-sync-popup__logo" style="--bb-sync-popup-bar-color: #635bff">
                <img src="./assets/images/Brandbased-icon.svg" alt="" width="44" height="44" decoding="async">
            </span>

            <h1 id="signout-title" class="signout-card__title">Signed Out</h1>

            <p class="signout-card__text">
                You have successfully signed out from your BrandBased account.
            </p>

            <button type="button" class="signup-btn" onclick="goLogin()">
                Return to Login
            </button>
        </div>
    </div>

    <script>
        localStorage.removeItem("auth_token");
        localStorage.removeItem("account");
        localStorage.removeItem("is_logged_in");
        localStorage.removeItem("plan_type");
        localStorage.removeItem("pin_verified");

        function goLogin() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
